<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修復音符橋樑</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.instruction {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #progress-board {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        #game-container {
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        /* 橋樑區域設計 */
        #bridge-area {
            background-color: #34495e;
            padding: 30px 10px;
            border-radius: 15px;
            box-shadow: inset 0px 5px 15px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; /* 三段橋樑的間距 */
            border-bottom: 8px solid #7f8c8d; /* 橋面基底 */
            margin-bottom: 30px;
            flex-wrap: wrap; /* 螢幕太小時自動換行 */
        }

        /* 單一段橋樑（一個頻現句區塊） */
        .bridge-segment {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            gap: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* 個別音符 */
        .note {
            background-color: white;
            color: #2c3e50;
            font-size: 2.5rem;
            width: 60px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0px 4px 0px #bdc3c7;
            user-select: none;
        }

        /* 缺口的音符 */
        .missing-note {
            background-color: #34495e;
            color: #f1c40f;
            border: 3px dashed #f1c40f;
            box-shadow: none;
            box-sizing: border-box;
        }

        /* 選項按鈕區域 */
        #options-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }

        .option-btn {
            background-color: #e67e22;
            color: white;
            font-size: 3rem;
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0px 6px 0px #d35400;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0px 0px 0px #d35400;
        }

        .option-btn:hover {
            background-color: #f39c12;
        }

        /* 動畫效果 */
        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .correct-fill {
            background-color: #2ecc71 !important;
            color: white !important;
            border: 3px solid #27ae60 !important;
            box-shadow: 0px 4px 0px #27ae60 !important;
            transform: scale(1.1);
            transition: all 0.3s;
        }

        #message {
            margin-top: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            height: 40px;
        }

        /* 過關結算畫面 */
        #end-screen {
            display: none;
            background-color: #27ae60;
            padding: 50px;
            border-radius: 15px;
            border: 5px solid #2ecc71;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease-out;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #end-screen h2 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .restart-btn {
            background-color: #f1c40f;
            color: #2c3e50;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 5px 0px #f39c12;
        }
    </style>
</head>
<body>

    <h1>🌉 修復音符橋樑</h1>
    <p class="instruction">工程師請注意！這座橋有著重複的音符圖案，但中間破了一個洞「？」。<br>請觀察前後的規律，點擊下方正確的材料來修補它！</p>

    <div id="progress-board">目前進度：<span id="current-q">1</span> / 10</div>

    <div id="game-container">
        <div id="bridge-area">
            </div>

        <div id="options-area">
            <button class="option-btn" onclick="checkAnswer('♩')">♩</button>
            <button class="option-btn" onclick="checkAnswer('♫')">♫</button>
            <button class="option-btn" onclick="checkAnswer('𝄽')">𝄽</button>
        </div>

        <div id="end-screen">
            <h2>🌟 橋樑修復完畢 🌟</h2>
            <p style="font-size: 1.5rem; margin-bottom: 30px;">你成功補好了 10 個漏洞，是個出色的節奏工程師！</p>
            <button class="restart-btn" onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <div id="message"></div>

    <script>
        // 題庫：定義不同的節奏頻現句結構 (陣列形式方便挖空)
        const patterns = [
            ["♩", "♫", "♩", "𝄽"],
            ["♫", "♫", "♩", "♩"],
            ["♩", "𝄽", "♩", "𝄽"],
            ["♩", "♫", "♫", "♩"],
            ["♫", "𝄽", "♫", "𝄽"],
            ["♩", "♩", "♫", "♫"],
            ["♫", "♩", "♫", "♩"]
        ];

        const MAX_QUESTIONS = 10;
        let currentQuestion = 1;
        let isClickable = true;
        let currentMissingNote = ""; // 記錄當前題目正確的音符答案
        let missingElementRef = null; // 記錄畫面上那個缺口的 HTML 元素

        const bridgeArea = document.getElementById('bridge-area');
        const endScreen = document.getElementById('end-screen');
        const messageDisplay = document.getElementById('message');
        const progressDisplay = document.getElementById('current-q');

        function startGame() {
            currentQuestion = 1;
            progressDisplay.textContent = currentQuestion;
            endScreen.style.display = "none";
            document.getElementById('options-area').style.display = "flex";
            initRound();
        }

        function initRound() {
            isClickable = true;
            messageDisplay.textContent = "";
            bridgeArea.innerHTML = ""; 

            // 1. 隨機選一個頻現句結構
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];
            
            // 2. 決定要把哪一個位置挖空 (0 到 3)
            const missingIndex = Math.floor(Math.random() * 4);
            currentMissingNote = pattern[missingIndex]; // 記下正確答案

            // 3. 建立三段橋樑 (前後完整，中間破洞)
            for (let segmentNum = 1; segmentNum <= 3; segmentNum++) {
                const segmentDiv = document.createElement('div');
                segmentDiv.classList.add('bridge-segment');

                for (let i = 0; i < 4; i++) {
                    const noteDiv = document.createElement('div');
                    noteDiv.classList.add('note');

                    // 如果是第二段橋，且剛好是挖空的位置
                    if (segmentNum === 2 && i === missingIndex) {
                        noteDiv.classList.add('missing-note');
                        noteDiv.textContent = "?";
                        noteDiv.id = "target-hole"; // 給它一個 ID 方便等一下修改
                        missingElementRef = noteDiv;
                    } else {
                        noteDiv.textContent = pattern[i];
                    }
                    segmentDiv.appendChild(noteDiv);
                }
                bridgeArea.appendChild(segmentDiv);
            }
        }

        // 檢查玩家點擊的按鈕
        function checkAnswer(selectedNote) {
            if (!isClickable) return;

            if (selectedNote === currentMissingNote) {
                // 答對了
                isClickable = false;
                
                // 把問號變成正確的音符，並加入特效
                missingElementRef.textContent = selectedNote;
                missingElementRef.classList.remove('missing-note');
                missingElementRef.classList.add('correct-fill');

                messageDisplay.style.color = "#2ecc71";
                messageDisplay.textContent = "🎉 修補成功！";

                setTimeout(() => {
                    if (currentQuestion >= MAX_QUESTIONS) {
                        showEndScreen();
                    } else {
                        currentQuestion++;
                        progressDisplay.textContent = currentQuestion;
                        initRound();
                    }
                }, 1200); 

            } else {
                // 答錯了
                isClickable = false;
                
                // 整個橋樑震動提示錯誤
                bridgeArea.classList.add('shake');
                messageDisplay.style.color = "#e74c3c";
                messageDisplay.textContent = "❌ 不對喔，再觀察一下前後的規律！";

                setTimeout(() => {
                    bridgeArea.classList.remove('shake');
                    isClickable = true;
                    messageDisplay.textContent = "";
                }, 800);
            }
        }

        function showEndScreen() {
            document.getElementById('options-area').style.display = "none";
            messageDisplay.textContent = "";
            endScreen.style.display = "block";
        }

        startGame();
    </script>
</body>
</html>

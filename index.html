<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修復音符橋樑</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.instruction {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background-color: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 10px;
        }

        #progress-board {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        #game-container {
            width: 100%;
            max-width: 1000px; /* 稍微加寬以容納4段橋 */
            position: relative;
        }

        /* 橋樑區域設計 */
        #bridge-area {
            background-color: #34495e;
            padding: 30px 10px;
            border-radius: 15px;
            box-shadow: inset 0px 5px 15px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            border-bottom: 8px solid #7f8c8d; 
            margin-bottom: 30px;
            flex-wrap: wrap; /* 螢幕太小時自動換行 */
        }

        /* 單一段橋樑（一個頻現句區塊） */
        .bridge-segment {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            gap: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* 個別音符 */
        .note {
            background-color: white;
            color: #2c3e50;
            font-size: 2.2rem;
            width: 50px; /* 稍微縮小一點點以放得下4段 */
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0px 4px 0px #bdc3c7;
            user-select: none;
            transition: all 0.3s;
        }

        /* 正在等待修復的缺口 (安靜狀態) */
        .waiting-hole {
            background-color: #2c3e50;
            color: #7f8c8d;
            border: 3px dashed #7f8c8d;
            box-shadow: none;
            box-sizing: border-box;
            opacity: 0.7;
        }

        /* 現在要修復的缺口 (閃爍狀態) */
        .active-hole {
            background-color: #34495e;
            color: #f1c40f;
            border: 4px dashed #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
            box-sizing: border-box;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); border-color: #f1c40f; }
            50% { transform: scale(1.1); border-color: #f39c12; }
            100% { transform: scale(1); border-color: #f1c40f; }
        }

        /* 選項按鈕區域 */
        #options-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }

        .option-btn {
            background-color: #e67e22;
            color: white;
            font-size: 3rem;
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0px 6px 0px #d35400;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0px 0px 0px #d35400;
        }

        .option-btn:hover {
            background-color: #f39c12;
        }

        /* 動畫效果 */
        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .correct-fill {
            background-color: #2ecc71 !important;
            color: white !important;
            border: none !important;
            box-shadow: 0px 4px 0px #27ae60 !important;
            transform: scale(1.1);
            animation: none; /* 關閉閃爍 */
        }

        #message {
            margin-top: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            height: 40px;
        }

        /* 過關結算畫面 */
        #end-screen {
            display: none;
            background-color: #27ae60;
            padding: 50px;
            border-radius: 15px;
            border: 5px solid #2ecc71;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease-out;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #end-screen h2 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .restart-btn {
            background-color: #f1c40f;
            color: #2c3e50;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 5px 0px #f39c12;
        }
    </style>
</head>
<body>

    <h1>🌉 修復音符橋樑</h1>
    <p class="instruction">這座橋現在有 <strong>2 個破洞</strong>！<br>請觀察規律，點擊下方材料，先幫忙修好<strong>「正在閃爍」</strong>的那一個洞吧！</p>

    <div id="progress-board">目前進度：<span id="current-q">1</span> / 10</div>

    <div id="game-container">
        <div id="bridge-area"></div>

        <div id="options-area">
            <button class="option-btn" onclick="checkAnswer('♩')">♩</button>
            <button class="option-btn" onclick="checkAnswer('♫')">♫</button>
            <button class="option-btn" onclick="checkAnswer('𝄽')">𝄽</button>
        </div>

        <div id="end-screen">
            <h2>🌟 橋樑全面修復 🌟</h2>
            <p style="font-size: 1.5rem; margin-bottom: 30px;">你成功補好了所有的漏洞，是個頂級的節奏工程師！</p>
            <button class="restart-btn" onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <div id="message"></div>

    <script>
        const patterns = [
            ["♩", "♫", "♩", "𝄽"],
            ["♫", "♫", "♩", "♩"],
            ["♩", "𝄽", "♩", "𝄽"],
            ["♩", "♫", "♫", "♩"],
            ["♫", "𝄽", "♫", "𝄽"],
            ["♩", "♩", "♫", "♫"],
            ["♫", "♩", "♫", "♩"]
        ];

        const MAX_QUESTIONS = 10;
        let currentQuestion = 1;
        let isClickable = true;
        
        // 用來儲存當前題目中，需要修復的洞
        let holesToFill = []; 
        let currentHoleIndex = 0; // 目前正在修復第幾個洞

        const bridgeArea = document.getElementById('bridge-area');
        const endScreen = document.getElementById('end-screen');
        const messageDisplay = document.getElementById('message');
        const progressDisplay = document.getElementById('current-q');

        function startGame() {
            currentQuestion = 1;
            progressDisplay.textContent = currentQuestion;
            endScreen.style.display = "none";
            document.getElementById('options-area').style.display = "flex";
            initRound();
        }

        function initRound() {
            isClickable = true;
            messageDisplay.textContent = "";
            bridgeArea.innerHTML = ""; 
            holesToFill = [];
            currentHoleIndex = 0;

            // 1. 隨機選一個頻現句結構
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];
            
            // 2. 決定要在哪 2 個橋樑段落挖洞 (隨機從 0, 1, 2, 3 中選兩個不重複的數字)
            let segmentsWithHoles = [];
            while(segmentsWithHoles.length < 2) {
                let r = Math.floor(Math.random() * 4);
                if(!segmentsWithHoles.includes(r)) {
                    segmentsWithHoles.push(r);
                }
            }
            segmentsWithHoles.sort(); // 讓破洞由左至右出現

            // 3. 建立 4 段橋樑
            for (let segmentNum = 0; segmentNum < 4; segmentNum++) {
                const segmentDiv = document.createElement('div');
                segmentDiv.classList.add('bridge-segment');

                // 檢查這一段橋樑是否需要被挖洞
                let isHoleSegment = segmentsWithHoles.includes(segmentNum);
                let holeIndexInSegment = isHoleSegment ? Math.floor(Math.random() * 4) : -1;

                for (let i = 0; i < 4; i++) {
                    const noteDiv = document.createElement('div');
                    noteDiv.classList.add('note');

                    // 如果剛好是挖空的位置
                    if (i === holeIndexInSegment) {
                        noteDiv.textContent = "?";
                        // 把這個破洞的 HTML 元素和它的正確答案存起來
                        holesToFill.push({
                            element: noteDiv,
                            answer: pattern[i]
                        });
                    } else {
                        noteDiv.textContent = pattern[i];
                    }
                    segmentDiv.appendChild(noteDiv);
                }
                bridgeArea.appendChild(segmentDiv);
            }

            // 4. 更新破洞的視覺狀態 (讓第一個洞閃爍)
            updateHoleFocus();
        }

        // 更新破洞的焦點，讓學生知道現在要修哪一個
        function updateHoleFocus() {
            holesToFill.forEach((holeObj, index) => {
                if (index === currentHoleIndex) {
                    // 現在要修的洞：閃爍黃色
                    holeObj.element.className = 'note active-hole';
                } else if (index > currentHoleIndex) {
                    // 還沒輪到的洞：暗色虛線
                    holeObj.element.className = 'note waiting-hole';
                }
            });
        }

        // 檢查玩家點擊的按鈕
        function checkAnswer(selectedNote) {
            if (!isClickable) return;

            let activeHole = holesToFill[currentHoleIndex];

            if (selectedNote === activeHole.answer) {
                // 答對了 (修好一個洞)
                activeHole.element.textContent = selectedNote;
                activeHole.element.className = 'note correct-fill';

                currentHoleIndex++; // 前進到下一個洞

                // 檢查是不是所有的洞都修好了
                if (currentHoleIndex >= holesToFill.length) {
                    isClickable = false;
                    messageDisplay.style.color = "#2ecc71";
                    messageDisplay.textContent = "🎉 兩個洞都修補成功！";

                    setTimeout(() => {
                        if (currentQuestion >= MAX_QUESTIONS) {
                            showEndScreen();
                        } else {
                            currentQuestion++;
                            progressDisplay.textContent = currentQuestion;
                            initRound();
                        }
                    }, 1200); 
                } else {
                    // 還有洞沒修完，把焦點移到下一個洞
                    updateHoleFocus();
                }

            } else {
                // 答錯了
                isClickable = false;
                bridgeArea.classList.add('shake');
                messageDisplay.style.color = "#e74c3c";
                messageDisplay.textContent = "❌ 材料不對喔，再觀察一下！";

                setTimeout(() => {
                    bridgeArea.classList.remove('shake');
                    isClickable = true;
                    messageDisplay.textContent = "";
                }, 800);
            }
        }

        function showEndScreen() {
            document.getElementById('options-area').style.display = "none";
            messageDisplay.textContent = "";
            endScreen.style.display = "block";
        }

        startGame();
    </script>
</body>
</html>
